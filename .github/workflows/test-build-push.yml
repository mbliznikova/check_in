name: test-build-push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watchAll=false

      - name: Export web bundle
        run: |
          npx expo export --platform web &
          PID=$!

          while [ ! -d dist ]; do
            sleep 2
          done

          echo "dist created"

          sleep 15

          ps -fp $PID || true

          kill -TERM $PID || true
          wait $PID || true

          echo "export step completed"

      - uses: docker/setup-buildx-action@v3
        if: github.event_name == 'push'

      - name: Verify dist output
        run: |
          echo "=== dist/ contents ==="
          ls -lh dist/
          echo "=== checking key files exist ==="
          test -f dist/index.html && echo "✓ index.html" || (echo "✗ index.html MISSING" && exit 1)
          test -d dist/_expo && echo "✓ _expo/" || (echo "✗ _expo/ MISSING" && exit 1)
          echo "=== bundle size ==="
          du -sh dist/

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
